set -g default-shell /bin/zsh
set-option -g default-terminal "screen-256color"

# panes
set -g pane-border-style 'fg=colour252 bg=colour190'
set -g pane-active-border-style 'bg=colour190 fg=colour252'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour236 fg=colour255 dim'
set -g status-left ' #[fg=green]#H'
set -g status-right '#[fg=white]%M:%S %p#[default] #[fg=blue]%m/%d '
setw -g window-status-current-format ' #I  #[fg=colour245]#W#[fg=colour245]#F'
set -g status-right-length 50
set -g status-left-length 20
setw -g window-status-current-style 'fg=colour255'

set -g clock-mode-style 24
set -g base-index 1
set -g mouse on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on




