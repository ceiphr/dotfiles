swipe:
  3:
    left:
      command: 'xdotool key xdotool key alt+Right'
    right:
      command: 'xdotool key xdotool key alt+Left'
    up:
      command: 'xdotool key super'
    down:
      command: 'xdotool key super'
  4:
    up:
      command: 'xdotool key ctrl+super+Down'
    down:
      command: 'xdotool key ctrl+super+Up'
pinch:
  in:
    command: 'xdotool key super+a'
    threshold: 0.1
  out:
     command: 'xdotool key super'
     threshold: 0.1

threshold:
  swipe: 1
  pinch: 1

interval:
  swipe: 1
  pinch: 1

